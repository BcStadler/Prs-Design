<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TableServe — New Order</title>
    <link
      rel="stylesheet"
      href="/node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{>header}}
    <main class="d-flex">
      {{>nav}}
      <section class="content p-4 flex-grow-1">
        <form class="form w-100">
          <div>
            <div
              class="d-flex justify-content-between pb-4 mb-5 border-bottom border-2"
            >
              <h2 class="form-label"><strong>New Request</strong></h2>
            </div>

            <div class="row g-5 mb-4">
              <div class="col-md-6">
                <div class="mb-4">
                  <label for="description" class="form-label"
                    >Description</label
                  >
                  <input
                    id="description"
                    class="form-control"
                    type="text"
                    placeholder="Enter a brief description for you purchase"
                  />
                </div>

                <div class="mb-4">
                  <label for="justification" class="form-label"
                    >Justification</label
                  >
                  <textarea
                    id="justification"
                    class="form-control"
                    rows="1"
                    placeholder="Enter a justification for your purchase request"
                  ></textarea>
                </div>
              </div>

              <div class="col-md-6">
                <div class="mb-4">
                  <label for="Method" class="form-label">Delivery Method</label>
                  <select
                    id="Method"
                    class="form-select"
                    style="max-width: 250px"
                  >
                    <option value="PICKUP" selected>Pickup</option>
                    <option value="DELIVERY">Delivery</option>
                  </select>
                </div>

                <div class="mb-4">
                  <label for="status" class="form-label">Status</label>
                  <select
                    id="status"
                    class="form-select"
                    style="max-width: 250px"
                  >
                    <option value="NEW" selected>New</option>
                    <option value="APPROVED">Approved</option>
                    <option value="REVIEW">Review</option>
                    <option value="REJECTED">Rejected</option>
                  </select>
                </div>

                <div class="mb-4">
                  <label for="requested-By" class="form-label"
                    >Requested By</label
                  >
                  <select
                    id="requested-By"
                    class="form-select"
                    style="max-width: 250px"
                  >
                    <option value="ellie">Elinore Steubet</option>
                    <option value="casey">Casey Nguyen</option>
                    <option value="alex">Alex Porter</option>
                    <option value="jamie">Jamie Lee</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="d-flex justify-content-end mt-4">
              <a
                href="/request-detail.html"
                class="btn btn-outline-primary me-2"
                >Cancel</a
              >
              <button type="submit" class="btn btn-primary">
                <svg
                  class="bi pe-none me-2"
                  width="16"
                  height="16"
                  fill="#FFFFFF"
                >
                  <use href="/assets/bootstrap-icons.svg#save" />
                </svg>
                Save request
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
