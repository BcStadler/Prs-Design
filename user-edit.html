<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prs — Edit User</title>
    <link
      rel="stylesheet"
      href="/node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
        <div
          class="d-flex justify-content-between pb-4 mb-4 border-bottom border-2"
        >
          <h2>Edit User</h2>
        </div>
        <form class="d-flex flex-column w-75 gap-3">
          <!-- First Name and Last Name Row -->
          <div class="d-flex gap-3">
            <div class="flex-grow-1">
              <div class="mb-3">
                <label for="first-name" class="form-label">First Name</label>
                <input
                  id="first-name"
                  type="text"
                  class="form-control"
                  value="Elinore"
                />
              </div>
            </div>
            <div class="flex-grow-1">
              <div class="mb-3">
                <label for="last-name" class="form-label">Last Name</label>
                <input
                  id="last-name"
                  type="text"
                  class="form-control"
                  value="Steubet"
                />
              </div>
            </div>
          </div>

          <!-- Email and Phone Row -->
          <div class="d-flex gap-3">
            <div class="flex-grow-1">
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input
                  id="email"
                  type="email"
                  class="form-control"
                  value="elinor_steuber42@example.com"
                />
              </div>
            </div>
            <div class="flex-grow-1">
              <div class="mb-3">
                <label for="phone" class="form-label">Phone</label>
                <input
                  id="phone"
                  type="tel"
                  class="form-control"
                  value="5687937044"
                />
              </div>
            </div>
          </div>

          <!-- Username and Password Row -->
          <div class="d-flex gap-3">
            <div class="flex-grow-1">
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input
                  id="username"
                  type="text"
                  class="form-control"
                  value="elinor_steuber42"
                />
              </div>
            </div>
            <div class="flex-grow-1">
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input
                  id="password"
                  type="password"
                  class="form-control"
                  value="password123"
                />
              </div>
            </div>
          </div>

          <!-- Role Section -->
          <h5>Role</h5>
          <div class="d-flex gap-4 align-items-center">
            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                id="reviewer"
                name="reviewer"
                checked
              />
              <label class="form-check-label" for="reviewer">Reviewer</label>
            </div>
            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                id="admin"
                name="admin"
                checked
              />
              <label class="form-check-label" for="admin">Admin</label>
            </div>
          </div>

          <!-- Buttons Row -->
          <div class="d-flex justify-content-end gap-2 mt-4">
            <a href="/users.html" class="btn btn-outline-primary">Cancel</a>
            <button type="submit" class="btn btn-primary">
              <svg
                class="bi pe-none me-2"
                width="16"
                height="16"
                fill="#FFFFFF"
              >
                <use href="/assets/bootstrap-icons.svg#save" />
              </svg>
              Save user
            </button>
          </div>
        </form>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
