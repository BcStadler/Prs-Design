<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prs — New Request Line</title>
    <link
      rel="stylesheet"
      href="/node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
        <form class="form w-100" novalidate data-success="/requests.html">
          <div
            class="d-flex justify-content-between pb-4 mb-4 border-bottom border-2"
          >
            <h2 class="form-label"><strong>New Request Line</strong></h2>
          </div>

          <div class="card p-4" style="max-width: 560px">
            <div class="mb-4">
              <h5 class="mb-3">Item</h5>
              <label for="product" class="form-label">Product</label>
              <select id="product" class="form-select" required>
                <option value="" selected disabled>Select...</option>
                <option>Refined Ceramic Towels</option>
                <option>Fantastic Ceramic Hat</option>
              </select>
              <div class="invalid-feedback">Product is required</div>
            </div>

            <div class="mb-4">
              <p class="mb-1 fw-semibold">Price</p>
              <p class="fs-5">$0.00</p>
            </div>

            <div class="mb-4">
              <label for="quantity" class="form-label">Quantity</label>
              <input
                id="quantity"
                type="number"
                class="form-control"
                placeholder="0"
                value=""
                min="0"
                required
              />
              <div class="invalid-feedback">Quantity must be at least 1</div>
            </div>

            <div class="mb-4">
              <p class="mb-1 fw-semibold">Amount</p>
              <p class="fs-5">$0.00</p>
            </div>

            <div class="d-flex justify-content-end">
              <a
                href="/request-detail.html"
                class="btn btn-outline-primary me-2"
                >Cancel</a
              >
              <button type="submit" class="btn btn-primary">
                <svg
                  class="bi pe-none me-2"
                  width="16"
                  height="16"
                  fill="#FFFFFF"
                >
                  <use href="/assets/bootstrap-icons.svg#save" />
                </svg>
                Save line
              </button>
            </div>
          </div>
        </form>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/validation.js"></script>
  </body>
</html>
