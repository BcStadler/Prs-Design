<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TableServe — New Menu Item</title>
    <link
      rel="stylesheet"
      href="/node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
        <div
          class="d-flex justify-content-between pb-4 mb-4 border-bottom border-2"
        >
          <h2>New Product</h2>
        </div>
        <form class="d-flex flex-column gap-4 w-75">
          <div class="d-flex flex-wrap gap-4 w-100">
            <div
              class="mb-3 flex-grow-1"
              style="min-width: 220px; max-width: 260px"
            >
              <label for="productNumber" class="form-label"
                >Product Number</label
              >
              <input
                id="productNumber"
                type="text"
                class="form-control"
                placeholder="Enter product number"
              />
            </div>
            <div class="mb-3 flex-grow-1" style="min-width: 320px">
              <label for="name" class="form-label">Product Name</label>
              <input
                id="name"
                type="text"
                class="form-control"
                placeholder="Enter product name"
              />
            </div>
          </div>

          <div class="d-flex flex-wrap gap-4 w-100">
            <div
              class="mb-3 flex-grow-1"
              style="min-width: 160px; max-width: 180px"
            >
              <label for="price" class="form-label">Price</label>
              <input
                id="price"
                type="number"
                step="0.01"
                class="form-control"
                placeholder="Enter product's"
              />
            </div>
            <div
              class="mb-3 flex-grow-1"
              style="min-width: 160px; max-width: 180px"
            >
              <label for="unit" class="form-label">Unit</label>
              <input
                id="unit"
                type="text"
                class="form-control"
                placeholder="Enter unit"
              />
            </div>
            <div class="mb-3 flex-grow-2" style="min-width: 240px">
              <label for="vendorId" class="form-label">Vendor</label>
              <select id="vendorId" class="form-select">
                <option value="">Select Vendor...</option>
                <option value="1">Vendor A</option>
                <option value="2">Vendor B</option>
                <option value="3">Vendor C</option>
              </select>
            </div>
          </div>

          <div class="d-flex justify-content-end gap-2 mt-3">
            <a href="/products.html" class="btn btn-outline-primary">Cancel</a>
            <button type="submit" class="btn btn-primary">
              <svg
                class="bi pe-none me-2"
                width="16"
                height="16"
                fill="#FFFFFF"
              >
                <use href="/assets/bootstrap-icons.svg#save" />
              </svg>
              Save product
            </button>
          </div>
        </form>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
