<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TableServe — New Order</title>
    <link
      rel="stylesheet"
      href="/node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{>header}}
    <main class="d-flex">
      {{>nav}}
      <section class="content p-4 flex-grow-1">
        <form class="form w-100">
          <div>
            <div
              class="d-flex justify-content-between pb-4 mb-5 border-bottom border-2"
            >
              <h2 class="form-label"><strong>Edit Request</strong></h2>
            </div>

            <div class="row g-5 mb-4">
              <div class="col-md-6">
                <div class="mb-4">
                  <label for="description" class="form-label"
                    >Description</label
                  >
                  <input
                    id="description"
                    class="form-control"
                    type="text"
                    placeholder="Enter a brief description for you purchase"
                  />
                </div>

                <div class="mb-4">
                  <label for="justification" class="form-label"
                    >Justification</label
                  >
                  <textarea
                    id="justification"
                    class="form-control"
                    rows="1"
                    placeholder="Enter a justification for your purchase request"
                  ></textarea>
                </div>
              </div>

              <div class="col-md-6">
                <div class="mb-4">
                  <label for="Method" class="form-label">Delivery Method</label>
                  <select
                    id="Method"
                    class="form-select"
                    style="max-width: 250px"
                  >
                    <option value="PICKUP" selected>Pickup</option>
                    <option value="DELIVERY">Delivery</option>
                  </select>
                </div>

                <div class="mb-4">
                  <label for="status" class="form-label">Status</label>
                  <select
                    id="status"
                    class="form-select"
                    style="max-width: 250px"
                  >
                    <option value="NEW" selected>New</option>
                    <option value="APPROVED">Approved</option>
                    <option value="REVIEW">Review</option>
                    <option value="REJECTED">Rejected</option>
                  </select>
                </div>

                <div class="mb-4">
                  <label for="requested-By" class="form-label"
                    >Requested By</label
                  >
                  <select
                    id="requested-By"
                    class="form-select"
                    style="max-width: 250px"
                  >
                    <option value="">Select User...</option>
                    <option value="casey">Casey Nguyen</option>
                    <option value="alex">Alex Porter</option>
                    <option value="jamie">Jamie Lee</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="d-flex justify-content-end mt-4">
              <a
                href="/request-detail.html"
                class="btn btn-outline-primary me-2"
                >Cancel</a
              >
              <button type="submit" class="btn btn-primary">
                <svg
                  class="bi pe-none me-2"
                  width="16"
                  height="16"
                  fill="#FFFFFF"
                >
                  <use href="/assets/bootstrap-icons.svg#save" />
                </svg>
                Save request
              </button>
            </div>

            <div class="card p-4 mt-5">
              <h5 class="card-title">Items</h5>
              <table class="table w-75">
                <thead>
                  <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Amount</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>Keyboards</td>
                    <td>$24.99</td>
                    <td>2</td>
                    <td>$24.99</td>
                    <td>
                      <a href="/requestline-edit.html" class="btn btn-outline">
                        <svg
                          class="bi pe-none me-2"
                          width="16"
                          height="16"
                          fill="#007AFF"
                        >
                          <use href="/assets/bootstrap-icons.svg#pencil" />
                        </svg>
                      </a>
                      <button
                        type="button"
                        class="btn btn-outline"
                        data-bs-toggle="modal"
                        data-bs-target="#deleteRequestLineModal"
                      >
                        <svg
                          class="bi pe-none me-2"
                          width="16"
                          height="16"
                          fill="#007AFF"
                        >
                          <use href="/assets/bootstrap-icons.svg#trash" />
                        </svg>
                      </button>
                    </td>
                  </tr>
                  <div
                    class="modal fade"
                    id="deleteRequestLineModal"
                    tabindex="-1"
                    aria-hidden="true"
                  >
                    <div class="modal-dialog">
                      <div class="modal-content">
                        <div class="modal-header">
                          <h5 class="modal-title">Delete Request</h5>
                          <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="modal"
                            aria-label="Close"
                          ></button>
                        </div>
                        <div class="modal-body">
                          <p>Are you sure you want to delete this Request?</p>
                        </div>
                        <div class="modal-footer">
                          <button
                            type="button"
                            class="btn btn-outline-primary"
                            data-bs-dismiss="modal"
                          >
                            Cancel
                          </button>
                          <button
                            type="button"
                            class="btn btn-danger"
                            data-bs-dismiss="modal"
                          >
                            Delete
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                </tbody>
                <tfoot>
                  <tr>
                    <td>
                      <a
                        href="/requestline-create.html"
                        class="btn btn-outline-primary"
                      >
                        <svg
                          class="bi pe-none me-2"
                          width="16"
                          height="16"
                          fill="#007AFF"
                        >
                          <use href="/assets/bootstrap-icons.svg#plus-circle" />
                        </svg>
                        Add a line
                      </a>
                    </td>
                    <td>$49.98</td>
                    <td></td>
                    <td></td>
                    <td></td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </form>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
