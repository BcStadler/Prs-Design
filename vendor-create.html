<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRS — New Vendor</title>
    <link
      rel="stylesheet"
      href="/node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
        <div class="d-flex flex-column" style="max-width: 800px">
          <h1 class="mb-4 pb-3 border-bottom">New Vendor</h1>

          <form class="d-flex flex-column gap-3">
            <!-- Vendor Code and Vendor Name Row -->
            <div class="d-flex gap-3">
              <div class="flex-grow-1">
                <label for="vendorCode" class="form-label">Vendor Code</label>
                <input
                  type="text"
                  class="form-control"
                  id="vendorCode"
                  placeholder="Enter short vendor code"
                />
              </div>
              <div class="flex-grow-1">
                <label for="vendorName" class="form-label">Vendor Name</label>
                <input
                  type="text"
                  class="form-control"
                  id="vendorName"
                  placeholder="Enter vendor name"
                />
              </div>
            </div>

            <!-- Address Row -->
            <div>
              <label for="address" class="form-label">Address</label>
              <input
                type="text"
                class="form-control"
                id="address"
                placeholder="Enter vendor's address"
              />
            </div>

            <!-- City, State, Zip Row -->
            <div class="d-flex gap-3">
              <div class="flex-grow-1">
                <label for="city" class="form-label">City</label>
                <input
                  type="text"
                  class="form-control"
                  id="city"
                  placeholder="Enter city"
                />
              </div>
              <div style="flex: 0 1 150px">
                <label for="state" class="form-label">State</label>
                <select class="form-select" id="state">
                  <option selected>Select state...</option>
                  <option>AL</option>
                  <option>AK</option>
                  <option>AZ</option>
                  <option>AR</option>
                  <option>CA</option>
                  <option>CO</option>
                  <option>CT</option>
                  <option>DE</option>
                  <option>FL</option>
                  <option>GA</option>
                  <option>HI</option>
                  <option>ID</option>
                  <option>IL</option>
                  <option>IN</option>
                  <option>IA</option>
                  <option>KS</option>
                  <option>KY</option>
                  <option>LA</option>
                  <option>ME</option>
                  <option>MD</option>
                  <option>MA</option>
                  <option>MI</option>
                  <option>MN</option>
                  <option>MS</option>
                  <option>MO</option>
                  <option>MT</option>
                  <option>NE</option>
                  <option>NV</option>
                  <option>NH</option>
                  <option>NJ</option>
                  <option>NM</option>
                  <option>NY</option>
                  <option>NC</option>
                  <option>ND</option>
                  <option>OH</option>
                  <option>OK</option>
                  <option>OR</option>
                  <option>PA</option>
                  <option>RI</option>
                  <option>SC</option>
                  <option>SD</option>
                  <option>TN</option>
                  <option>TX</option>
                  <option>UT</option>
                  <option>VT</option>
                  <option>VA</option>
                  <option>WA</option>
                  <option>WV</option>
                  <option>WI</option>
                  <option>WY</option>
                </select>
              </div>
              <div style="flex: 0 1 120px">
                <label for="zip" class="form-label">Zip</label>
                <input
                  type="text"
                  class="form-control"
                  id="zip"
                  placeholder="Enter zip code"
                />
              </div>
            </div>

            <!-- Phone and Email Row -->
            <div class="d-flex gap-3">
              <div class="flex-grow-1">
                <label for="phone" class="form-label">Phone</label>
                <input
                  type="tel"
                  class="form-control"
                  id="phone"
                  placeholder="Enter phone number"
                />
              </div>
              <div class="flex-grow-1">
                <label for="email" class="form-label">Email</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  placeholder="Enter email address"
                />
              </div>
            </div>

            <!-- Buttons -->
            <div class="d-flex gap-2 justify-content-end mt-3">
              <button type="button" class="btn btn-outline-primary">
                Cancel
              </button>
              <button type="submit" class="btn btn-primary">
                <svg
                  class="bi pe-none me-2"
                  width="16"
                  height="16"
                  fill="currentColor"
                >
                  <use href="/assets/bootstrap-icons.svg#download" />
                </svg>
                Save vendor
              </button>
            </div>
          </form>
        </div>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
