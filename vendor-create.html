<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRS — New Vendor</title>
    <link
      rel="stylesheet"
      href="/node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    {{> header}}
    <main class="d-flex">
      {{> nav}}
      <section class="content p-4 flex-grow-1">
        <div class="d-flex flex-column" style="max-width: 900px">
          <div class="d-flex justify-content-between pb-4 mb-5 border-bottom">
            <h2 class="fw-normal">New Vendor</h2>
          </div>

          <form
            class="d-flex flex-column gap-4 w-100"
            novalidate
            data-success="/vendors.html"
          >
            <div class="d-flex flex-wrap gap-4 w-100">
              <div
                class="mb-3 flex-grow-1"
                style="min-width: 160px; max-width: 180px"
              >
                <label for="vendorCode" class="form-label">Vendor Code</label>
                <input
                  type="text"
                  class="form-control"
                  id="vendorCode"
                  placeholder="Enter short vendor code"
                  required
                />
                <div class="invalid-feedback">Vendor Code is required</div>
              </div>
              <div class="mb-3 flex-grow-1" style="min-width: 320px">
                <label for="vendorName" class="form-label">Vendor Name</label>
                <input
                  type="text"
                  class="form-control"
                  id="vendorName"
                  placeholder="Enter vendor name"
                  required
                />
                <div class="invalid-feedback">Vendor Name is required</div>
              </div>
            </div>

            <div class="mb-3 w-100">
              <label for="address" class="form-label">Address</label>
              <input
                type="text"
                class="form-control"
                id="address"
                placeholder="Enter vendor's address"
                required
              />
              <div class="invalid-feedback">Address is required</div>
            </div>

            <div class="d-flex flex-wrap gap-4 w-100">
              <div
                class="mb-3 flex-grow-1"
                style="min-width: 220px; max-width: 300px"
              >
                <label for="city" class="form-label">City</label>
                <input
                  type="text"
                  class="form-control"
                  id="city"
                  placeholder="Enter city"
                  required
                />
                <div class="invalid-feedback">City is required</div>
              </div>
              <div
                class="mb-3 flex-grow-1"
                style="min-width: 150px; max-width: 170px"
              >
                <label for="state" class="form-label">State</label>
                <select class="form-select" id="state" required>
                  <option value="" selected disabled>Select state...</option>
                  <option>AL</option>
                  <option>AK</option>
                  <option>AZ</option>
                  <option>AR</option>
                  <option>CA</option>
                  <option>CO</option>
                  <option>CT</option>
                  <option>DE</option>
                  <option>FL</option>
                  <option>GA</option>
                  <option>HI</option>
                  <option>ID</option>
                  <option>IL</option>
                  <option>IN</option>
                  <option>IA</option>
                  <option>KS</option>
                  <option>KY</option>
                  <option>LA</option>
                  <option>ME</option>
                  <option>MD</option>
                  <option>MA</option>
                  <option>MI</option>
                  <option>MN</option>
                  <option>MS</option>
                  <option>MO</option>
                  <option>MT</option>
                  <option>NE</option>
                  <option>NV</option>
                  <option>NH</option>
                  <option>NJ</option>
                  <option>NM</option>
                  <option>NY</option>
                  <option>NC</option>
                  <option>ND</option>
                  <option>OH</option>
                  <option>OK</option>
                  <option>OR</option>
                  <option>PA</option>
                  <option>RI</option>
                  <option>SC</option>
                  <option>SD</option>
                  <option>TN</option>
                  <option>TX</option>
                  <option>UT</option>
                  <option>VT</option>
                  <option>VA</option>
                  <option>WA</option>
                  <option>WV</option>
                  <option>WI</option>
                  <option>WY</option>
                </select>
                <div class="invalid-feedback">State is required</div>
              </div>
              <div
                class="mb-3 flex-grow-1"
                style="min-width: 140px; max-width: 150px"
              >
                <label for="zip" class="form-label">Zip</label>
                <input
                  type="text"
                  class="form-control"
                  id="zip"
                  placeholder="Enter zip code"
                  required
                />
                <div class="invalid-feedback">Zip is required</div>
              </div>
            </div>

            <div class="d-flex flex-wrap gap-4 w-100">
              <div class="mb-3 flex-grow-1" style="min-width: 220px">
                <label for="phone" class="form-label">Phone</label>
                <input
                  type="tel"
                  class="form-control"
                  id="phone"
                  placeholder="Enter phone number"
                />
              </div>
              <div class="mb-3 flex-grow-1" style="min-width: 220px">
                <label for="email" class="form-label">Email</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  placeholder="Enter email address"
                />
              </div>
            </div>

            <div class="d-flex gap-2 justify-content-end mt-3">
              <a href="vendors.html" class="btn btn-outline-primary">
                Cancel
              </a>
              <button type="submit" class="btn btn-primary">
                <svg
                  class="bi pe-none me-2"
                  width="16"
                  height="16"
                  fill="#FFFFFF"
                >
                  <use href="/assets/bootstrap-icons.svg#save" />
                </svg>
                Save vendor
              </button>
            </div>
          </form>
        </div>
      </section>
    </main>
    <script src="/node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/validation.js"></script>
  </body>
</html>
